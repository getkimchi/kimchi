name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  pr-checks:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: ci-pr-${{ github.head_ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          bun: "true"
          playwright: "true"

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/proxy-helper/go.mod
          cache-dependency-path: tools/proxy-helper/go.sum

      - name: Build proxy-helper
        run: make copy-for-dev # This builds the binary and puts it into a location kimchi can find it
        working-directory: tools/proxy-helper

      - name: Test proxy-helper
        run: make test
        working-directory: tools/proxy-helper

      - name: Check (lint + type check)
        run: pnpm run check

      - name: Build binary
        run: pnpm run build:binary

      - name: Test
        run: KIMCHI_PROXY_HELPER=$(pwd)/bin/proxy-helper pnpm run test

      - name: Smoke tests
        run: pnpm run test:smoke

  master-checks:
    # Run on both push-to-master and pull_request so PR CI exercises the same
    # post-merge checks (e.g. `make build` + `pnpm run test` without the
    # `KIMCHI_PROXY_HELPER` env var) that will run after merge. Without this,
    # a PR based on a stale base ref can pass `pr-checks` and only fail at the
    # post-merge `master-checks` step, leaving master red until a follow-up
    # lands (see #657 for the original incident).
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      # Single shared group for master pushes (only one build at a time, cancel
      # stale ones). Per-PR groups for pull requests so concurrent PRs don't
      # cancel each other's checks.
      group: ${{ github.event_name == 'push' && 'ci-master' || format('ci-pr-master-checks-{0}', github.head_ref) }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          bun: "true"
          playwright: "true"

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/proxy-helper/go.mod
          cache-dependency-path: tools/proxy-helper/go.sum

      - name: Build proxy-helper
        run: make build
        working-directory: tools/proxy-helper

      - name: Test proxy-helper
        run: make test
        working-directory: tools/proxy-helper

      - name: Check (lint + type check)
        run: pnpm run check

      - name: Build binary
        run: pnpm run build:binary

      - name: Test
        run: pnpm run test

      - name: Smoke tests
        run: pnpm run test:smoke
