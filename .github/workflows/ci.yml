name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  pr-checks:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: ci-pr-${{ github.head_ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          bun: "true"
          playwright: "true"

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/proxy-helper/go.mod
          cache-dependency-path: tools/proxy-helper/go.sum

      - name: Build proxy-helper
        run: make build
        working-directory: tools/proxy-helper

      - name: Test proxy-helper
        run: make test
        working-directory: tools/proxy-helper

      - name: Check (lint + type check)
        run: pnpm run check

      - name: Build binary
        run: pnpm run build:binary

      - name: Test
        run: pnpm run test

      - name: Smoke tests
        run: pnpm run test:smoke

  master-checks:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: ci-master
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
        with:
          bun: "true"
          playwright: "true"

      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/proxy-helper/go.mod
          cache-dependency-path: tools/proxy-helper/go.sum

      - name: Build proxy-helper
        run: make build
        working-directory: tools/proxy-helper

      - name: Test proxy-helper
        run: make test
        working-directory: tools/proxy-helper

      - name: Check (lint + type check)
        run: pnpm run check

      - name: Build binary
        run: pnpm run build:binary

      - name: Test
        run: pnpm run test

      - name: Smoke tests
        run: pnpm run test:smoke
