name: Build Benchmark Image

on:
  push:
    branches:
      - master
    paths:
      - 'benchmark/terminal-bench-2/**'
  workflow_dispatch:

env:
  REGISTRY: us-docker.pkg.dev/castai-hub/kubecast

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: ./benchmark/terminal-bench-2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: us-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.ARTIFACT_BUILDER_JSON_KEY }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./benchmark/terminal-bench-2/
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/kimchi-terminal-bench-2:${{ github.sha }}
            ${{ env.REGISTRY }}/kimchi-terminal-bench-2:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
