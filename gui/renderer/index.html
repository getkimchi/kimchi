<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Kimchi GUI</title>
    <style>
        /*
          Inline on purpose: this must paint before the JS bundle loads
          (and before app.css takes over), so the very first frame
          Electron shows is this splash instead of blank white.
        */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #f6f7fb;
        }

        #splash {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f6f7fb;
            z-index: 9999;
            transition: opacity 220ms ease;
            font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
        }

        body.app-ready #splash {
            opacity: 0;
            pointer-events: none;
        }

        .splash-emoji {
            font-size: 56px;
            line-height: 1;
            margin-bottom: 14px;
            text-align: center;
            animation: splash-bob 1.6s ease-in-out infinite;
        }

        .splash-title {
            font-size: 20px;
            font-weight: 700;
            color: #1d1d1f;
            text-align: center;
            margin-bottom: 6px;
        }

        .splash-status {
            font-size: 14px;
            color: #6f6f78;
            text-align: center;
            margin-bottom: 16px;
        }

        .splash-dots {
            display: flex;
            justify-content: center;
            gap: 6px;
        }

        .splash-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #6d4aff;
            animation: splash-pulse 1.2s ease-in-out infinite;
        }

        .splash-dots span:nth-child(2) { animation-delay: 0.15s; }
        .splash-dots span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes splash-bob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        @keyframes splash-pulse {
            0%, 80%, 100% { opacity: 0.25; transform: scale(0.85); }
            40% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>

<body>
    <div id="splash">
        <div>
            <div class="splash-emoji">🥢</div>
            <div class="splash-title">Kimchi</div>
            <div class="splash-status" id="splash-status">Starting Kimchi...</div>
            <div class="splash-dots"><span></span><span></span><span></span></div>
        </div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
